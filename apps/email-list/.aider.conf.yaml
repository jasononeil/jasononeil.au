read:
  - apps/email-list/AI_CONTEXT.md

# For how I interact with it
watch-files: true
auto-commits: false
show-diffs: false
commit-prompt: Use the conversation history to think about the intent of this change, not just the diff. Why, not what. Create a commit message that describes the intent of this change on the first line. Add extra detail in the body about the "what" of the changes, but only if the changes are not self explanatory. If they are self explanatory, just use the first line.

# Linting and fixing
auto-test: true
test-cmd: pnpm typecheck && pnpm run --recursive test run
auto-lint: true
lint-cmd:
  - pnpm prettier --write
